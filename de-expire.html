document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ PANTRY ============ -->\n    <sc-if value=\"{{ showPantry }}\">\n      <div>\n        <div style=\"margin:20px 20px 4px;padding:22px 24px;background:#FFFFFF;border-radius:24px;box-shadow:0 1px 2px rgba(15,15,18,0.04),0 8px 24px rgba(15,15,18,0.08);display:flex;align-items:center;gap:20px;\">\n          <sc-if value=\"{{ heroHasUrgent }}\">\n            <div style=\"flex-shrink:0;\">\n              <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:60px;line-height:0.9;letter-spacing:-0.04em;color:{{ heroColor }};\">{{ heroNumber }}<\u002Fdiv>\n              <svg width=\"58\" height=\"9\" viewBox=\"0 0 58 9\" fill=\"none\" style=\"display:block;margin-top:2px;\"><path d=\"M2 5.5C9 2 14 2 21 5.5S35 9 42 5.5 54 2 56 4\" stroke=\"#FF5A4E\" stroke-width=\"2.5\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ heroAllGood }}\">\n            <svg width=\"64\" height=\"64\" viewBox=\"0 0 64 64\" fill=\"none\" stroke=\"#1AAE56\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;\">\n              <path d=\"M32 5C17 5 5.5 16 5.5 31.5 5.5 47 17 58.5 32 58.5S58.5 47 58.5 31.5C58.5 16 47 5 32 5z\"><\u002Fpath>\n              <path d=\"M23 26.5c.2-1.6.2-3 0-4\"><\u002Fpath>\n              <path d=\"M41 26.5c.2-1.6.2-3 0-4\"><\u002Fpath>\n              <path d=\"M22 39c4.5 6 15.5 6 20 0\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fsc-if>\n          <div style=\"flex:1;\">\n            <div style=\"font-size:17px;font-weight:600;line-height:1.25;\">{{ heroTitle }}<\u002Fdiv>\n            <div style=\"font-size:14px;color:#8E8E96;margin-top:3px;\">{{ heroSub }}<\u002Fdiv>\n          <\u002Fdiv>\n          <svg width=\"74\" height=\"80\" viewBox=\"0 0 100 104\" fill=\"none\" stroke=\"#2540F0\" stroke-width=\"3.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;\">\n            <path d=\"M28 50 L28 92 Q28 95 31 95 L69 95 Q72 95 72 92 L72 50\"><\u002Fpath>\n            <path d=\"M28 50 L50 35 L72 50\"><\u002Fpath>\n            <path d=\"M50 35 L62 46\"><\u002Fpath>\n            <path d=\"M34 82 L66 82\"><\u002Fpath>\n            <circle cx=\"44\" cy=\"63\" r=\"2.4\" fill=\"#2540F0\" stroke=\"none\"><\u002Fcircle>\n            <circle cx=\"56\" cy=\"63\" r=\"2.4\" fill=\"#2540F0\" stroke=\"none\"><\u002Fcircle>\n            <path d=\"M43 71 Q50 78 57 71\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ isEmpty }}\">\n          <div style=\"text-align:center;padding:36px 40px 40px;color:#8E8E96;\">\n            <svg width=\"156\" height=\"186\" viewBox=\"0 0 96 122\" fill=\"none\" stroke=\"#2540F0\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"display:block;margin:0 auto 8px;\">\n              <path d=\"M26 14 Q22 14 22 19 L22 104 Q22 109 27 109 L69 109 Q74 109 74 104 L74 19 Q74 14 70 14 Z\"><\u002Fpath>\n              <path d=\"M22 48 L74 48\"><\u002Fpath>\n              <path d=\"M31 24 L31 40\"><\u002Fpath>\n              <path d=\"M31 56 L31 84\"><\u002Fpath>\n              <path d=\"M60 27 L60 37 M55 32 L65 32\"><\u002Fpath>\n              <circle cx=\"46\" cy=\"70\" r=\"2.4\" fill=\"#2540F0\" stroke=\"none\"><\u002Fcircle>\n              <circle cx=\"58\" cy=\"70\" r=\"2.4\" fill=\"#2540F0\" stroke=\"none\"><\u002Fcircle>\n              <path d=\"M45 80 Q52 86 59 80\"><\u002Fpath>\n            <\u002Fsvg>\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:22px;color:#0F0F12;letter-spacing:-0.02em;\">Let's fill the fridge.<\u002Fdiv>\n            <div style=\"font-size:15px;margin-top:8px;line-height:1.5;\">Tap the <span style=\"color:#FF5A4E;font-weight:700;\">+<\u002Fspan> to scan or jot down<br>your first item.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-for list=\"{{ groups }}\" as=\"group\" hint-placeholder-count=\"3\">\n          <div style=\"padding:26px 20px 8px;display:flex;align-items:baseline;justify-content:space-between;\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#8E8E96;\">{{ group.label }}<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#8E8E96;\">{{ group.count }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin:0 20px;background:#FFFFFF;border-radius:24px;box-shadow:0 1px 2px rgba(15,15,18,0.04),0 8px 24px rgba(15,15,18,0.08);overflow:hidden;\">\n            <sc-for list=\"{{ group.items }}\" as=\"item\" hint-placeholder-count=\"3\">\n              <div onclick=\"{{ item.onOpen }}\" style=\"position:relative;display:flex;align-items:center;gap:15px;min-height:70px;padding:13px 18px;cursor:pointer;\">\n                <div style=\"position:relative;width:48px;height:48px;flex-shrink:0;\">\n                  <svg width=\"48\" height=\"48\" viewBox=\"0 0 48 48\" style=\"transform:rotate(-90deg);\">\n                    <circle cx=\"24\" cy=\"24\" r=\"20\" fill=\"none\" stroke=\"#EDEDF2\" stroke-width=\"4\"><\u002Fcircle>\n                    <circle cx=\"24\" cy=\"24\" r=\"20\" fill=\"none\" stroke=\"{{ item.color }}\" stroke-width=\"4\" stroke-linecap=\"round\" pathLength=\"100\" stroke-dasharray=\"{{ item.ringDash }}\"><\u002Fcircle>\n                  <\u002Fsvg>\n                  <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:16px;color:{{ item.centerColor }};\">{{ item.centerText }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"flex:1;min-width:0;\">\n                  <div style=\"font-size:16px;font-weight:600;line-height:1.2;\">{{ item.name }}<\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;gap:5px;margin-top:3px;\">\n                    <span style=\"display:inline-flex;\">{{ item.catIcon }}<\u002Fspan>\n                    <span style=\"font-size:13px;color:#8E8E96;\">{{ item.category }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"text-align:right;flex-shrink:0;\">\n                  <div style=\"display:inline-block;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;font-feature-settings:'tnum';padding:4px 10px;border-radius:9999px;background:{{ item.pillBg }};color:{{ item.pillFg }};\">{{ item.pillText }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#B4B4BC;margin-top:5px;\">{{ item.dateLabel }}<\u002Fdiv>\n                <\u002Fdiv>\n                <sc-if value=\"{{ item.notLast }}\">\n                  <div style=\"position:absolute;left:81px;right:0;bottom:0;height:1px;background:#EDEDF2;\"><\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ============ REPORTS ============ -->\n    <sc-if value=\"{{ showReports }}\">\n      <div style=\"padding:10px 20px 0;\">\n        <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:28px;letter-spacing:-0.02em;\">Waste report<\u002Fdiv>\n        <div style=\"font-size:14px;color:#8E8E96;margin-top:2px;\">your last 30 days<\u002Fdiv>\n\n        <sc-if value=\"{{ report.logEmpty }}\">\n          <div style=\"text-align:center;padding:36px 24px 40px;color:#8E8E96;\">\n            <svg width=\"150\" height=\"150\" viewBox=\"0 0 100 100\" fill=\"none\" stroke=\"#2540F0\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"display:block;margin:0 auto 8px;\">\n              <path d=\"M22 30 Q22 26 26 26 L74 26 Q78 26 78 30 L78 78 Q78 82 74 82 L26 82 Q22 82 22 78 Z\"><\u002Fpath>\n              <path d=\"M22 42 L78 42\"><\u002Fpath>\n              <path d=\"M34 20 L34 32 M66 20 L66 32\"><\u002Fpath>\n              <path d=\"M38 71 L38 58\"><\u002Fpath>\n              <path d=\"M50 71 L50 51\"><\u002Fpath>\n              <path d=\"M62 71 L62 63\"><\u002Fpath>\n            <\u002Fsvg>\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:22px;color:#0F0F12;letter-spacing:-0.02em;\">No history yet.<\u002Fdiv>\n            <div style=\"font-size:15px;margin-top:8px;line-height:1.5;\">Mark items used or tossed and<br>your report builds itself.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ report.hasData }}\">\n          <div style=\"margin-top:18px;padding:22px 24px;background:#FFFFFF;border-radius:24px;box-shadow:0 1px 2px rgba(15,15,18,0.04),0 8px 24px rgba(15,15,18,0.08);display:flex;align-items:center;gap:20px;\">\n            <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:54px;line-height:0.9;letter-spacing:-0.04em;color:{{ report.wasteColor }};\">{{ report.wasteRate }}%<\u002Fdiv>\n            <div style=\"flex:1;\">\n              <div style=\"font-size:16px;font-weight:600;line-height:1.25;\">of what you tracked went to waste<\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#8E8E96;margin-top:6px;\">{{ report.usedLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:26px 0 8px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#8E8E96;\">Expired before you used them<\u002Fdiv>\n          <div style=\"background:#FFFFFF;border-radius:24px;box-shadow:0 1px 2px rgba(15,15,18,0.04),0 8px 24px rgba(15,15,18,0.08);overflow:hidden;\">\n            <sc-if value=\"{{ report.expiredNone }}\">\n              <div style=\"padding:22px 20px;font-size:15px;color:#1AAE56;font-weight:500;\">Nothing expired unused. Nice work.<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-for list=\"{{ report.expiredUnused }}\" as=\"e\" hint-placeholder-count=\"3\">\n              <div style=\"position:relative;display:flex;align-items:center;gap:14px;min-height:60px;padding:12px 18px;\">\n                <div style=\"width:10px;height:10px;border-radius:9999px;background:#FF5A4E;flex-shrink:0;\"><\u002Fdiv>\n                <div style=\"flex:1;min-width:0;\">\n                  <div style=\"font-size:16px;font-weight:600;line-height:1.2;\">{{ e.name }}<\u002Fdiv>\n                  <div style=\"font-size:13px;color:#8E8E96;margin-top:2px;\">{{ e.category }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#B4B4BC;flex-shrink:0;\">{{ e.when }}<\u002Fdiv>\n                <sc-if value=\"{{ e.notLast }}\">\n                  <div style=\"position:absolute;left:42px;right:0;bottom:0;height:1px;background:#EDEDF2;\"><\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"padding:26px 0 8px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#8E8E96;\">Where waste happens<\u002Fdiv>\n          <div style=\"background:#FFFFFF;border-radius:24px;box-shadow:0 1px 2px rgba(15,15,18,0.04),0 8px 24px rgba(15,15,18,0.08);padding:20px 22px;\">\n            <sc-if value=\"{{ report.catsNone }}\">\n              <div style=\"font-size:15px;color:#8E8E96;\">No waste logged yet.<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-for list=\"{{ report.cats }}\" as=\"c\" hint-placeholder-count=\"3\">\n              <div style=\"margin-bottom:16px;\">\n                <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:7px;\">\n                  <div style=\"font-size:15px;font-weight:600;\">{{ c.label }}<\u002Fdiv>\n                  <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:#8E8E96;\">{{ c.count }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"height:8px;border-radius:9999px;background:#F4F4F8;overflow:hidden;\">\n                  <div style=\"height:100%;border-radius:9999px;background:#FF5A4E;width:{{ c.pct }}%;\"><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <!-- FAB -->\n  <sc-if value=\"{{ showPantry }}\">\n    <div onclick=\"{{ openAdd }}\" style=\"position:absolute;right:22px;bottom:calc(env(safe-area-inset-bottom) + 24px);width:60px;height:60px;border-radius:9999px;background:#FF5A4E;box-shadow:0 0 0 1px rgba(255,90,78,0.16),0 16px 40px rgba(255,90,78,0.32);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:30;\">\n      <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.5\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ADD SHEET -->\n  <sc-if value=\"{{ showAdd }}\">\n    <div onclick=\"{{ close }}\" style=\"position:absolute;inset:0;background:rgba(15,15,18,0.42);z-index:40;animation:scrimIn 200ms ease;\"><\u002Fdiv>\n    <div style=\"position:absolute;left:0;right:0;bottom:0;background:#FFFFFF;border-radius:40px 40px 0 0;z-index:41;padding:14px 22px calc(env(safe-area-inset-bottom) + 32px);animation:sheetUp 320ms cubic-bezier(0.34,1.56,0.64,1);max-height:94%;overflow-y:auto;\">\n      <div style=\"width:40px;height:5px;border-radius:9999px;background:#E8E8EE;margin:0 auto 18px;\"><\u002Fdiv>\n      <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:26px;letter-spacing:-0.02em;\">Add to pantry<\u002Fdiv>\n\n      <!-- scan controls -->\n      <sc-if value=\"{{ camIdle }}\">\n        <div style=\"margin-top:18px;display:flex;gap:10px;\">\n          <div onclick=\"{{ startBarcode }}\" style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:16px;background:#F4F4F8;color:#3C3C44;font-weight:600;font-size:14px;cursor:pointer;\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3C3C44\" stroke-width=\"1.9\" stroke-linecap=\"round\"><path d=\"M4 6v12M8 6v12M12 6v12M16 6v12M20 6v12\"><\u002Fpath><\u002Fsvg>\n            Scan barcode\n          <\u002Fdiv>\n          <div onclick=\"{{ startCamera }}\" style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:16px;background:#F4F4F8;color:#3C3C44;font-weight:600;font-size:14px;cursor:pointer;\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3C3C44\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z\"><\u002Fpath><circle cx=\"12\" cy=\"13\" r=\"4\"><\u002Fcircle><\u002Fsvg>\n            Scan date\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ camStreaming }}\">\n        <div style=\"margin-top:18px;border-radius:16px;overflow:hidden;background:#000;position:relative;\">\n          <sc-if value=\"{{ camError }}\">\n            <div style=\"padding:30px 22px;text-align:center;color:#fff;font-size:14px;line-height:1.5;\">{{ camErrorMsg }}<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ camNoError }}\">\n            <video ref=\"{{ videoRef }}\" style=\"width:100%;height:230px;object-fit:cover;display:block;\"><\u002Fvideo>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ camBarcode }}\">\n            <div style=\"position:absolute;left:0;right:0;bottom:0;padding:10px;text-align:center;color:#fff;font-size:13px;background:linear-gradient(transparent,rgba(0,0,0,0.5));\">Point at the barcode<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ camLive }}\">\n            <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;\">\n              <div style=\"width:82%;height:34%;border:2px solid rgba(255,255,255,0.95);border-radius:12px;box-shadow:0 0 0 2000px rgba(0,0,0,0.34);\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"position:absolute;left:0;right:0;bottom:0;padding:10px;text-align:center;color:#fff;font-size:13px;background:linear-gradient(transparent,rgba(0,0,0,0.55));\">Line up the expiry date inside the box, then Capture<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <sc-if value=\"{{ camLive }}\">\n          <div style=\"display:flex;gap:10px;margin-top:10px;align-items:center;\">\n            <div onclick=\"{{ capture }}\" style=\"flex:1;text-align:center;padding:14px;border-radius:16px;background:#FF5A4E;color:#fff;font-weight:600;cursor:pointer;\">Capture<\u002Fdiv>\n            <div onclick=\"{{ cancelCamera }}\" style=\"padding:14px 18px;border-radius:16px;background:#F4F4F8;color:#3C3C44;font-weight:600;cursor:pointer;\">Cancel<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ camBarcode }}\">\n          <div onclick=\"{{ cancelCamera }}\" style=\"margin-top:10px;text-align:center;padding:14px;border-radius:16px;background:#F4F4F8;color:#3C3C44;font-weight:600;cursor:pointer;\">Cancel<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ camShot }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:18px;border-radius:16px;overflow:hidden;\">\n          <img ref=\"{{ photoRef }}\" src=\"data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==\" style=\"width:100%;height:190px;object-fit:cover;display:block;\">\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;margin-top:1 tems:center;gap:7px;padding:9px 14px;border-radius:9999px;font-size:14px;font-weight:600;cursor:pointer;background:{{ chip.bg }};color:{{ chip.fg }};\">\n            <span style=\"display:inline-flex;\">{{ chip.icon }}<\u002Fspan>{{ chip.label }}\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#8E8E96;margin:22px 0 10px;\">Goes off<\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:8px;\">\n        <sc-for list=\"{{ dayPicks }}\" as=\"chip\" hint-placeholder-count=\"5\">\n          <div onclick=\"{{ chip.onClick }}\" style=\"padding:9px 15px;border-radius:9999px;font-size:14px;font-weight:600;cursor:pointer;background:{{ chip.bg }};color:{{ chip.fg }};\">{{ chip.label }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;margin:14px 0 0;\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8E8E96\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"3\"><\u002Frect><path d=\"M3 9h18M8 2v4M16 2v4\"><\u002Fpath><\u002Fsvg>\n        <input type=\"date\" value=\"{{ draftDateISO }}\" onchange=\"{{ onPickDate }}\" style=\"flex:1;border:none;outline:none;background:#F4F4F8;border-radius:16px;padding:14px 16px;font-family:'Geist',sans-serif;font-size:16px;color:#0F0F12;min-width:0;\">\n      <\u002Fdiv>\n      <div style=\"font-size:13px;color:#8E8E96;margin-top:12px;\">Goes off <span style=\"color:#0F0F12;font-weight:600;\">{{ draftDateLabel }}<\u002Fspan><\u002Fdiv>\n\n      <div onclick=\"{{ saveItem }}\" style=\"margin-top:26px;width:100%;text-align:center;padding:17px;border-radius:16px;font-size:17px;font-weight:600;cursor:pointer;background:{{ saveBg }};color:{{ saveFg }};\">Add it.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- DETAIL SHEET -->\n  <sc-if value=\"{{ showDetail }}\">\n    <div onclick=\"{{ close }}\" style=\"position:absolute;inset:0;background:rgba(15,15,18,0.42);z-index:40;animation:scrimIn 200ms ease;\"><\u002Fdiv>\n    <div style=\"position:absolute;left:0;right:0;bottom:0;background:#FFFFFF;border-radius:40px 40px 0 0;z-index:41;padding:14px 24px calc(env(safe-area-inset-bottom) + 32px);animation:sheetUp 320ms cubic-bezier(0.34,1.56,0.64,1);\">\n      <div style=\"width:40px;height:5px;border-radius:9999px;background:#E8E8EE;margin:0 auto 22px;\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:20px;\">\n        <div style=\"position:relative;width:92px;height:92px;flex-shrink:0;\">\n          <svg width=\"92\" height=\"92\" viewBox=\"0 0 92 92\" style=\"transform:rotate(-90deg);\">\n            <circle cx=\"46\" cy=\"46\" r=\"40\" fill=\"none\" stroke=\"#EDEDF2\" stroke-width=\"7\"><\u002Fcircle>\n            <circle cx=\"46\" cy=\"46\" r=\"40\" fill=\"none\" stroke=\"{{ selected.color }}\" stroke-width=\"7\" stroke-linecap=\"round\" pathLength=\"100\" stroke-dasharray=\"{{ selected.ringDash }}\"><\u002Fcircle>\n          <\u002Fsvg>\n          <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:34px;color:{{ selected.centerColor }};\">{{ selected.centerText }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;min-width:0;\">\n          <div style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:26px;line-height:1.05;letter-spacing:-0.02em;\">{{ selected.name }}<\u002Fdiv>\n          <div style=\"display:inline-block;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;padding:4px 10px;border-radius:9999px;margin-top:10px;background:{{ selected.pillBg }};color:{{ selected.pillFg }};\">{{ selected.pillText }}<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:6px;margin-top:8px;\">\n            <span style=\"display:inline-flex;\">{{ selected.catIcon }}<\u002Fspan>\n            <span style=\"font-size:13px;color:#8E8E96;\">{{ selected.category }} · {{ selected.dateLabel }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div onclick=\"{{ onUsed }}\" style=\"margin-top:26px;width:100%;text-align:center;padding:16px;border-radius:16px;font-size:17px;font-weight:600;cursor:pointer;background:#33D673;color:#FFFFFF;\">Used it up.<\u002Fdiv>\n      <div style=\"display:flex;gap:10px;margin-top:10px;\">\n        <div onclick=\"{{ onSnooze }}\" style=\"flex:1;text-align:center;padding:16px;border-radius:16px;font-size:16px;font-weight:600;cursor:pointer;background:#F4F4F8;color:#3C3C44;\">Snooze 3 days<\u002Fdiv>\n        <div onclick=\"{{ onToss }}\" style=\"flex:1;text-align:center;padding:16px;border-radius:16px;font-size:16px;font-weight:600;cursor:pointer;background:#FFE2DE;color:#E83F33;\">Tossed it<\u002Fdiv>\n      <\u002Fdiv>\n      <div onclick=\"{{ onDelete }}\" style=\"margin-top:12px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:15px;border-radius:16px;font-size:16px;font-weight:600;cursor:pointer;background:#FFFFFF;color:#8E8E96;border:1.5px solid #E8E8EE;\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8E8E96\" stroke-width=\"1.75\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6\"><\u002Fpath><\u002Fsvg>\n        Remove — added by mistake\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  STORE = 'spoiler_data_v2';\n  MON = { JAN: 0, FEB: 1, MAR: 2, APR: 3, MAY: 4, JUN: 5, JUL: 6, AUG: 7, SEP: 8, OCT: 9, NOV: 10, DEC: 11 };\n  CATS = ['Dairy', 'Produce', 'Bakery', 'Leftovers', 'Drinks', 'Dips', 'Meat', 'Pantry', 'Other'];\n  CAT_ICONS = {\n    Dairy: ['M9 2h6v3l1 2v13a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2V7l1-2z', 'M8 11h8'],\n    Produce: ['M12 22V12', 'M12 12C9 12 7 10 7 7c3 0 5 2 5 5z', 'M12 12c3 0 5-2 5-5-3 0-5 2-5 5z'],\n    Bakery: ['M4 12a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4c0 1.1-.9 2-2 2v5a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1v-5a2 2 0 0 1-2-2z'],\n    Leftovers: ['M5 2v8a2 2 0 0 0 4 0V2', 'M7 10v12', 'M18 2c-2 0-3 2-3 5s1 4 3 4', 'M18 2v20'],\n    Drinks: ['M6 8h12l-1.2 12.2a1 1 0 0 1-1 .8H8.2a1 1 0 0 1-1-.8L6 8z', 'M5 8h14', 'M9 4l1 4', 'M15 4l-1 4'],\n    Dips: ['M3 11h18a9 9 0 0 1-18 0z', 'M8 7c.5-1 .5-2 0-3', 'M12 7c.5-1 .5-2 0-3', 'M16 7c.5-1 .5-2 0-3'],\n    Meat: ['M7 4h6a5 5 0 0 1 0 10H9a5 5 0 0 1-5-5 5 5 0 0 1 3-5z', 'M9 9h.01'],\n    Pantry: ['M21 8 12 3 3 8v8l9 5 9-5V8z', 'M3 8l9 5 9-5', 'M12 13v8'],\n    Other: ['M20 12 12 4H5a1 1 0 0 0-1 1v7l8 8a2 2 0 0 0 3 0l5-5a2 2 0 0 0 0-3z', 'M8.5 8.5h.01'],\n  };\n\n  catIcon = (name, size, color) => {\n    const paths = this.CAT_ICONS[name] || this.CAT_ICONS.Other;\n    return React.createElement('svg', { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: color, strokeWidth: 1.75, strokeLinecap: 'round', strokeLinejoin: 'round', style: { display: 'block', flexShrink: 0 } },\n      paths.map((d, i) => React.createElement('path', { key: i, d: d })));\n  };\n\n  constructor(props) {\n    super(props);\n    this.videoRef = React.createRef();\n    this.photoRef = React.createRef();\n    this.stream = null;\n    this._zxControls = null;\n    this._zxStarting = false;\n    const D = 86400000, now = Date.now();\n    this.state = {\n      items: [\n        { id: 1, name: 'Hummus', category: 'Dips', days: -1 },\n        { id: 2, name: 'Strawberries', category: 'Produce', days: 0 },\n        { id: 3, name: 'Whole milk', category: 'Dairy', days: 1 },\n        { id: 4, name: 'Rotisserie chicken', category: 'Leftovers', days: 2 },\n        { id: 5, name: 'Baby spinach', category: 'Pro E96',\n      selected,\n      onUsed: () => this.removeItem(selectedId, 'used'),\n      onToss: () => this.removeItem(selectedId, 'tossed'),\n      onSnooze: () => this.snooze(selectedId, 3),\n      onDelete: () => this.deleteItem(selectedId),\n      // scan\n      camIdle: camera === 'off',\n      camStreaming: camera === 'live' || camera === 'barcode',\n      camLive: camera === 'live',\n      camBarcode: camera === 'barcode',\n      camShot: camera === 'shot',\n      camError: !!cameraError,\n      camNoError: !cameraError,\n      camErrorMsg: cameraError,\n      videoRef: this.videoRef,\n      startCamera: this.startCamera,\n      startBarcode: this.startBarcode,\n      cancelCamera: this.cancelCamera,\n      capture: this.capture,\n      photo,\n      photoRef: this.photoRef,\n      ocrReading: ocrStatus === 'reading',\n      ocrFoundFlag: ocrStatus === 'found',\n      ocrNone: ocrStatus === 'none',\n      ocrFound,\n      productMsgShow: !!productStatus,\n      productMsg: pmsg[productStatus] || '',\n      productMsgColor: pcolor,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
